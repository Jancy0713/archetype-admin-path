scope_analysis:
  business_goal:
    - "让内部团队可统一维护素材条目。"
    - "让运营可以快速检索和定位素材。"
  success_criteria:
    - "管理员能完成素材创建、编辑和归档。"
    - "运营能按标签和状态搜索素材。"
  modules_in_scope:
