artifact_type: final_prd
version: "2.1.0"
status:
  step: final_prd_ready
  attempt: 1
  max_retry: 2
  ready_for_next: true
meta:
  title: "素材库管理后台 final_prd"
  flow_id: prd
  step_id: prd-04
  artifact_id: prd-04.final_prd
  source_paths:
    - prd-02.clarification.yaml
    - prd-03.execution_plan.yaml
  owner: codex
  updated_at: "2026-04-21T11:15:00Z"
overview:
  product_summary: "面向内部团队的素材库管理后台，支持素材维护、状态流转和按标签搜索。"
  current_goal:
    - "完成后台最小可用闭环。"
  success_criteria:
    - "管理员可创建、编辑、发布、归档并恢复素材。"
    - "运营可按标签和状态搜索素材。"
  collaboration_mode: "先完成最小 contract 输入，再补充后续增强项。"
scope:
  modules_in_scope:
    - "素材列表"
    - "素材编辑"
    - "标签管理"
  modules_out_of_scope:
    - "外部分享"
    - "审批流"
    - "多语言"
  rollout_boundary:
    - "只覆盖后台 Web 端。"
    - "只做平铺标签，不做层级标签。"
roles_and_permissions:
  roles:
    - name: 管理员
      client: admin-web
      main_goal: 维护素材与标签
      visible_scope:
        - "素材列表"
        - "素材编辑页"
        - "标签管理页"
      permission_notes:
        - "允许创建、编辑、发布、归档、恢复素材"
    - name: 运营
      client: admin-web
      main_goal: 搜索和查看素材
      visible_scope:
        - "素材列表"
      permission_notes:
        - "允许按标签和状态搜索"
        - "不允许修改素材"
  tenant_boundary:
    - "当前按单租户后台处理，不引入跨租户权限模型。"
domain_model:
  resources:
    - name: 素材
      resource_type: content_asset
      purpose: 后台管理的核心条目
      owner: 管理员
      key_attributes:
        - "标题"
        - "描述"
        - "标签集合"
        - "状态"
      known_states:
        - "draft"
        - "published"
        - "archived"
    - name: 标签
      resource_type: asset_tag
      purpose: 支撑分类和搜索
      owner: 管理员
      key_attributes:
        - "名称"
        - "唯一标识"
      known_states:
        - "active"
experience_design:
  modules:
    - name: 素材列表
      objective: 让运营和管理员快速搜索、查看并进入编辑。
      in_scope_pages:
        - "素材列表页"
      key_actions:
        - "按标签搜索"
        - "按状态筛选"
        - "进入编辑"
        - "恢复已归档素材"
    - name: 素材编辑
      objective: 让管理员完成创建、编辑、发布和归档。
      in_scope_pages:
        - "素材编辑页"
      key_actions:
        - "新建素材"
        - "保存草稿"
        - "发布素材"
        - "归档素材"
    - name: 标签管理
      objective: 让管理员维护平铺标签集合。
      in_scope_pages:
        - "标签管理页"
      key_actions:
        - "新增标签"
        - "编辑标签"
        - "删除未使用标签"
  pages:
    - client: admin-web
      module: 素材列表
      name: 素材列表页
      page_type: list
      goal: 搜索、筛选并查看素材
      primary_actions:
        - "搜索素材"
        - "状态筛选"
        - "查看详情"
    - client: admin-web
      module: 素材编辑
      name: 素材编辑页
      page_type: form
      goal: 维护素材详情和状态
      primary_actions:
        - "创建"
        - "编辑"
        - "发布"
        - "归档"
    - client: admin-web
      module: 标签管理
      name: 标签管理页
      page_type: management
      goal: 维护平铺标签
      primary_actions:
        - "新增标签"
        - "修改标签"
workflow_design:
  flows:
    - name: 创建并发布素材
      trigger: 管理员新建素材
      start: 素材列表页
      key_steps:
        - "进入素材编辑页"
        - "填写素材信息并保存草稿"
        - "确认后发布"
      end: 素材状态为 published
      is_async: false
    - name: 归档并恢复素材
      trigger: 管理员在列表或编辑页发起归档
      start: 素材列表页
      key_steps:
        - "归档素材"
        - "在归档状态下查看素材"
        - "必要时恢复到草稿"
      end: 素材状态为 archived 或 draft
      is_async: false
    - name: 按标签搜索素材
      trigger: 运营输入标签或切换状态筛选
      start: 素材列表页
      key_steps:
        - "输入关键词或选择标签"
        - "选择状态"
        - "查看搜索结果"
      end: 返回符合条件的素材集合
      is_async: false
  states:
    - resource_name: 素材
      current_states:
        - "draft"
        - "published"
        - "archived"
      missing_states: []
    - resource_name: 标签
      current_states:
        - "active"
      missing_states: []
constraints:
  non_functional:
    - "优先保证后台可维护性和状态一致性。"
  external_dependencies:
    - "无额外外部分享系统接入。"
  contract_constraints:
    - "contract 必须显式表达素材状态机和恢复规则。"
    - "contract 必须覆盖列表搜索参数和标签约束。"
blocking_questions:
  p0: []
contract_execution:
  recommended_batch_order:
    - batch-01-core-model
    - batch-02-admin-pages
    - batch-03-tags
  parallel_batches:
    - "batch-02-admin-pages 与 batch-03-tags 只能在 batch-01-core-model 完成后并行进入 contract。"
  selection_guidance:
    - "contract 必须一次只消费一个 ready batch，不允许把整份 final_prd 作为单一超大输入。"
    - "当共享资源或状态机发生变化时，应优先回到 batch-01-core-model 重新收敛。"
prd_batches:
  - batch_id: batch-01-core-model
    title: 核心资源与状态机
    goal: 先固定素材、标签和状态机，给后续页面 batch 提供稳定基础。
    summary:
      - "这一批只覆盖资源边界、状态定义和恢复规则。"
      - "列表搜索、编辑页面和标签维护都依赖这一批的对象约束。"
    grouped_modules:
      - "素材资源与状态机"
      - "标签资源模型"
    dependency_batches: []
    grouping_reason:
      - "素材与标签是共享对象，必须先定。"
      - "状态机一旦漂移，会同时带偏列表、编辑和恢复动作。"
    in_scope_pages:
      - "无独立业务页面，主要服务于共享 contract 视图"
    key_resources:
      - "素材"
      - "标签"
    key_flows:
      - "归档并恢复素材"
    size_control:
      target_contract_size: "控制在共享对象、状态和动作约束这一层，不展开完整页面交互。"
      keep_together:
        - "素材状态机"
        - "标签资源定义"
      split_triggers:
        - "如果开始写列表交互细节，应拆去 batch-02-admin-pages。"
    contract_constraints:
      - "必须显式表达 draft/published/archived 三态与恢复规则。"
    contract_handoff:
      contract_scope:
        - "素材资源模型"
        - "标签资源模型"
        - "状态流转动作"
      priority_modules:
        - "素材资源与状态机"
      required_contract_views:
        - "素材详情视图"
        - "状态流转动作视图"
      do_not_assume:
        - "不要引入审批流状态。"
        - "不要假设层级标签。"
    decision:
      allow_contract_design: true
      reason: 共享对象和状态规则已经收敛，可以先进入 contract。
  - batch_id: batch-02-admin-pages
    title: 列表与编辑闭环
    goal: 在共享对象已稳定的前提下收敛列表搜索、编辑、发布和恢复动作。
    summary:
      - "这一批承载运营和管理员最常用的页面闭环。"
      - "它依赖 batch-01 的状态机和资源定义。"
    grouped_modules:
      - "素材列表"
      - "素材编辑"
    dependency_batches:
      - batch-01-core-model
    grouping_reason:
      - "列表筛选、编辑表单和状态流转动作高度耦合。"
      - "如果拆散，contract 很容易在状态和页面动作上漂移。"
    in_scope_pages:
      - "素材列表页"
      - "素材编辑页"
    key_resources:
      - "素材"
    key_flows:
      - "创建并发布素材"
      - "按标签搜索素材"
      - "归档并恢复素材"
    size_control:
      target_contract_size: "控制在列表查询、详情编辑和状态动作闭环，不吸收标签维护细节。"
      keep_together:
        - "列表筛选参数"
        - "编辑页动作"
        - "恢复入口"
      split_triggers:
        - "如果开始写标签增删改规则，应拆去 batch-03-tags。"
    contract_constraints:
      - "必须覆盖列表搜索参数、状态筛选和编辑动作。"
    contract_handoff:
      contract_scope:
        - "素材列表与搜索"
        - "素材编辑与状态流转"
      priority_modules:
        - "素材列表与搜索"
        - "素材编辑"
      required_contract_views:
        - "素材列表查询视图"
        - "素材详情视图"
        - "状态流转动作视图"
      do_not_assume:
        - "不要扩展到批量归档。"
        - "不要扩展到外部分享或多语言。"
    decision:
      allow_contract_design: true
      reason: 页面闭环边界已明确，且依赖的共享对象已被前序 batch 收敛。
  - batch_id: batch-03-tags
    title: 标签管理补充
    goal: 补齐平铺标签的维护边界，并约束对列表搜索的影响面。
    summary:
      - "这一批只处理平铺标签维护，不回头重定义素材状态机。"
    grouped_modules:
      - "标签管理"
    dependency_batches:
      - batch-01-core-model
    grouping_reason:
      - "标签管理有独立页面，但仍共享标签对象定义。"
    in_scope_pages:
      - "标签管理页"
    key_resources:
      - "标签"
    key_flows:
      - "标签新增与编辑"
    size_control:
      target_contract_size: "只覆盖平铺标签维护和引用边界。"
      keep_together:
        - "标签名称与唯一标识约束"
      split_triggers:
        - "如果开始写层级标签，应视为新需求重开 PRD。"
    contract_constraints:
      - "只允许平铺标签，不引入层级结构。"
    contract_handoff:
      contract_scope:
        - "标签管理"
        - "标签资源约束"
      priority_modules:
        - "标签管理"
      required_contract_views:
        - "标签管理视图"
      do_not_assume:
        - "不要引入层级标签。"
        - "不要把标签管理扩展成复杂分类体系。"
    decision:
      allow_contract_design: true
      reason: 标签管理边界独立且依赖清楚，可以作为独立 batch 进入 contract。
decision:
  allow_contract_design: true
  ready_batches:
    - batch-01-core-model
    - batch-02-admin-pages
    - batch-03-tags
  blocked_batches: []
  reason: final_prd 已完成批次拆分，且不存在阻塞 contract 的 P0 问题，可按顺序逐批进入 contract。
